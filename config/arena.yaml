# MyLLMTradingAgents Arena Configuration

name: "LLM Trading Arena"
timezone: "America/New_York"
db_path: "arena.db"
cache_dir: "~/.myllmtradingagents/cache"

# Per-provider daily call limits (for budget control)
daily_call_limits:
  openrouter: 100
  gemini: 100
  openai_compatible: 100

# Markets to trade
markets:
  - type: us_equity
    timezone: "America/New_York"
    tickers:
      - AAPL
      - MSFT
      - AMZN
      - NVDA
      - TSLA

  - type: crypto
    timezone: "UTC"
    session_times:
      - "00:00"
      - "12:00"
    tickers:
      - BTC/USDT
      - ETH/USDT
      - XRP/USDT
      - SOL/USDT
      - DOGE/USDT

# Simulation parameters
simulation:
  initial_cash: 10000.0
  slippage_bps: 10.0      # 10 basis points = 0.1%
  fee_bps: 10.0           # 10 basis points = 0.1%
  max_position_pct: 0.25  # Max 25% of portfolio in single position
  max_orders_per_run: 3   # Max orders per trading session

# Competitors (LLM configs)
competitors:
  - id: gpt_5_2
    name: "GPT-5.2"
    provider: openai_compatible
    model: "gpt-5.2"

  - id: gemini_3_flash
    name: "Gemini 3 Flash"
    provider: openai_compatible
    model: "gemini-3-flash"

  - id: cclaude_sonnet_4_5
    name: "Claude Sonnet 4.5"
    provider: openai_compatible
    model: "claude-sonnet-4-5"
